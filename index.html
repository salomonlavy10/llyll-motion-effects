<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>llyll Motion Effects — Current Icons</title>
<style>
  :root{font-family:Inter,ui-sans-serif,system-ui,-apple-system,"Segoe UI",sans-serif;}
  *{box-sizing:border-box;}
  body{margin:0;background:#262522;color:#fcff80;}
  header{padding:22px 28px;border-bottom:1px solid rgba(252,255,128,.18);
    display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:12px;}
  h1{margin:0;font-size:19px;font-weight:700;}
  header .meta{color:#b4b0b0;font-size:13px;}
  .controls{display:flex;gap:10px;align-items:center;}
  button{cursor:pointer;border:1px solid rgba(252,255,128,.4);background:#000;color:#fcff80;
    font:inherit;font-weight:700;border-radius:8px;padding:8px 14px;}
  label.bg{color:#d8d4c8;font-size:13px;display:flex;gap:6px;align-items:center;}
  .grid{display:grid;gap:18px;padding:24px;
    grid-template-columns:repeat(auto-fill,minmax(190px,1fr));}
  .card{background:#2f2e2b;border:1px solid rgba(255,255,255,.07);border-radius:12px;
    overflow:hidden;display:flex;flex-direction:column;}
  .stage{aspect-ratio:1;width:100%;display:grid;place-items:center;
    background:#42413f;cursor:pointer;}
  .stage.checker{background-image:
    linear-gradient(45deg,#3a3936 25%,transparent 25%),
    linear-gradient(-45deg,#3a3936 25%,transparent 25%),
    linear-gradient(45deg,transparent 75%,#3a3936 75%),
    linear-gradient(-45deg,transparent 75%,#3a3936 75%);
    background-size:22px 22px;background-position:0 0,0 11px,11px -11px,-11px 0;background-color:#4d4c49;}
  .stage.concrete{background:#5a5954;}
  .stage.dark{background:#000;}
  .stage.light{background:#d8d4c8;}
  .stage div{width:88%;height:88%;}
  .cap{padding:9px 12px;font-size:13px;font-weight:600;color:#fff;border-top:1px solid rgba(255,255,255,.07);}
  .cap small{display:block;color:#787878;font-weight:400;font-size:11px;}
</style>
</head>
<body>
<header>
  <div><h1>llyll Motion Effects</h1><div class="meta">Current icon set · click any tile to replay</div></div>
  <div class="controls">
    <label class="bg">Background:
      <select id="bg"><option value="concrete">concrete</option><option value="checker">checker</option><option value="dark">dark</option><option value="light">ivory</option></select>
    </label>
    <button id="replayAll">Replay all</button>
  </div>
</header>
<div class="grid" id="grid"></div>
<script src="vendor/lottie.min.js"></script>
<script>
const ITEMS=[{"file":"dist/ahead.json","label":"were ahead"},{"file":"dist/alignment.json","label":"we need alignment"},{"file":"dist/apply-now.json","label":"apply now"},{"file":"dist/behind.json","label":"were behind"},{"file":"dist/coming-soon.json","label":"coming soon"},{"file":"dist/community.json","label":"the community"},{"file":"dist/confidential.json","label":"this is confidential"},{"file":"dist/deadline.json","label":"deadline"},{"file":"dist/feedback.json","label":"feedback"},{"file":"dist/free.json","label":"free"},{"file":"dist/goal-is.json","label":"the goal is"},{"file":"dist/great-news.json","label":"great news"},{"file":"dist/growing.json","label":"we are growing"},{"file":"dist/i-disagree.json","label":"I disagree"},{"file":"dist/important.json","label":"this is important"},{"file":"dist/it-is-live.json","label":"it is live"},{"file":"dist/join-us.json","label":"join us"},{"file":"dist/lets-confirm.json","label":"lets confirm"},{"file":"dist/lets-vote.json","label":"lets vote"},{"file":"dist/limited-spots.json","label":"limited spots"},{"file":"dist/milestone.json","label":"milestone"},{"file":"dist/more-time.json","label":"we need more time"},{"file":"dist/new.json","label":"new"},{"file":"dist/next-quarter.json","label":"next quarter"},{"file":"dist/next-step.json","label":"next step"},{"file":"dist/one-more-thing.json","label":"one more thing"},{"file":"dist/ownership.json","label":"ownership"},{"file":"dist/registration-open.json","label":"registration is open"},{"file":"dist/reminder.json","label":"reminder"},{"file":"dist/results.json","label":"results"},{"file":"dist/roadmap.json","label":"the roadmap"},{"file":"dist/save-your-spot.json","label":"save your spot"},{"file":"dist/share-this.json","label":"share this"},{"file":"dist/thank-you.json","label":"thank you"},{"file":"dist/the-numbers.json","label":"the numbers"},{"file":"dist/this-week.json","label":"this week"},{"file":"dist/together.json","label":"together"},{"file":"dist/watch-this.json","label":"watch this"},{"file":"dist/we-did-it.json","label":"we did it"}];
const grid=document.getElementById("grid");
const anims=[];
for(const it of ITEMS){
  const card=document.createElement("div");card.className="card";
  const stage=document.createElement("div");stage.className="stage concrete";
  const host=document.createElement("div");stage.appendChild(host);
  const cap=document.createElement("div");cap.className="cap";
  cap.innerHTML=it.label+"<small>"+it.file.replace("dist/","")+"</small>";
  card.appendChild(stage);card.appendChild(cap);grid.appendChild(card);
  const a=lottie.loadAnimation({container:host,renderer:"svg",loop:true,autoplay:true,path:it.file});
  anims.push(a);
  stage.addEventListener("click",()=>a.goToAndPlay(0,true));
}
document.getElementById("replayAll").onclick=()=>anims.forEach(a=>a.goToAndPlay(0,true));
document.getElementById("bg").onchange=e=>{
  document.querySelectorAll(".stage").forEach(s=>{s.className="stage "+e.target.value;});
};
</script>
</body>
</html>
